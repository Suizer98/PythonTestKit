x-app-volumes: &app-volumes
  - ./src:/app/src
  - ./packages:/app/packages

x-testkit-build: &testkit-build
  context: .
  dockerfile: Dockerfile-full
  args:
    BASE_IMAGE: esrisg/testkit-base:latest
  secrets:
    - secrets_username
    - secrets_password

x-dps-registry-env: &dps-registry-env
  UV_INDEX_DPS_USERNAME: ${SECRETS_USERNAME:-}
  UV_INDEX_DPS_PASSWORD: ${SECRETS_PASSWORD:-}

secrets:
  secrets_username:
    environment: SECRETS_USERNAME
  secrets_password:
    environment: SECRETS_PASSWORD

services:
  testkit-base:
    build:
      context: .
      dockerfile: Dockerfile
    image: esrisg/testkit-base:latest
    command: ["black", "--check", "."]
    volumes: *app-volumes
    working_dir: /app

  testkit:
    profiles:
      - full
    image: esrisg/testkit:latest
    build: *testkit-build
    command: ["uv", "run", "python", "-m", "pytest", "-v", "-s"]
    environment:
      <<: *dps-registry-env
      SQLSERVER_HOST: ${SQLSERVER_HOST:-}
      SQLSERVER_PORT: ${SQLSERVER_PORT:-}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE:-}
      SQLSERVER_USER: ${SQLSERVER_USER:-}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD:-}
    volumes: *app-volumes
    working_dir: /app

  packages:
    image: esrisg/testkit:latest
    build: *testkit-build
    command:
      - sh
      - -ec
      - |
        set -eu
        : "$${UV_INDEX_DPS_USERNAME:?Set SECRETS_USERNAME in .env (see sample.env)}"
        : "$${UV_INDEX_DPS_PASSWORD:?Set SECRETS_PASSWORD in .env}"
        mkdir -p /app/packages
        INDEX_URL="https://$${UV_INDEX_DPS_USERNAME}:$${UV_INDEX_DPS_PASSWORD}@sgts.gitlab-dedicated.com/api/v4/projects/60948/packages/pypi/simple"
        export PIP_NO_INPUT=1
        PIP="uv run --with pip python -m pip download --no-cache-dir --dest /app/packages"
        PLAT="--platform $${PIP_DOWNLOAD_PLATFORM} --python-version $${PIP_DOWNLOAD_PYTHON_VERSION} --implementation $${PIP_DOWNLOAD_IMPLEMENTATION}"
        IDX="--index-url $${INDEX_URL} --extra-index-url https://pypi.org/simple"
        $${PIP} "dps-sdk>=0.1.1" $${PLAT} --only-binary=:all: $${IDX}
        $${PIP} "win32-setctime>=1.0.0" $${PLAT} --only-binary=:all: $${IDX}
        $${PIP} "pyspark>=3.5.0,<4.0.0" $${IDX}
        $${PIP} "pyarrow>=24.0.0" $${PLAT} --only-binary=:all: $${IDX}
    environment:
      <<: *dps-registry-env
      PIP_DOWNLOAD_PLATFORM: ${PIP_DOWNLOAD_PLATFORM:-win_amd64}
      PIP_DOWNLOAD_PYTHON_VERSION: ${PIP_DOWNLOAD_PYTHON_VERSION:-311}
      PIP_DOWNLOAD_IMPLEMENTATION: ${PIP_DOWNLOAD_IMPLEMENTATION:-cp}
    volumes: *app-volumes
    working_dir: /app
