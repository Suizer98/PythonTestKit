name: python-test-kit

services:
  test:
    image: suizer98/python-test-kit:latest
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./:/usr/src/app
      - ./.git:/usr/src/app/.git
      # - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /usr/src/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - SEMGREP_APP_TOKEN=${SEMGREP_APP_TOKEN:-}
      - BLACK=${BLACK:-}
      - RUFF=${RUFF:-}
      - BANDIT=${BANDIT:-}
      - SAFETY=${SAFETY:-}
      - SEMGREP=${SEMGREP:-}
      - PYTEST=${PYTEST:-}
    profiles:
      - test
    command:
      - bash
      - -c
      - |
        echo '=============== Running Checks Tools ==============='

        if [ "$$(echo "$$BLACK" | tr '[:upper:]' '[:lower:]')" != "false" ]; then black --check . && echo 'Black OK' || exit 1; fi

        if [ "$$(echo "$$RUFF" | tr '[:upper:]' '[:lower:]')" != "false" ]; then ruff check . && echo 'Ruff OK' || exit 1; fi

        if [ "$$(echo "$$BANDIT" | tr '[:upper:]' '[:lower:]')" != "false" ]; then bandit -r . && echo 'Bandit OK' || exit 1; fi

        if [ "$$(echo "$$SAFETY" | tr '[:upper:]' '[:lower:]')" != "false" ]; then safety check && echo 'Safety OK' || exit 1; fi

        if [ "$$(echo "$$SEMGREP" | tr '[:upper:]' '[:lower:]')" != "false" ] && [ -n "$$SEMGREP_APP_TOKEN" ]; then git config --global --add safe.directory /usr/src/app && semgrep ci && echo 'Semgrep OK' || exit 1; elif [ "$$(echo "$$SEMGREP" | tr '[:upper:]' '[:lower:]')" != "false" ]; then echo 'Skipping Semgrep (no token)'; fi

        if [ "$$(echo "$$PYTEST" | tr '[:upper:]' '[:lower:]')" != "false" ]; then pytest tests/ -v --tb=short --disable-warnings || exit 1; fi

        echo '=============== All Tests Completed ==============='

      # To enable more strict type checking, use mypy:
      # mypy python/ && echo 'MyPy OK'
      # Original Semgrep cloud upload results version
      # semgrep ci --supply-chain && echo 'Semgrep OK'

  mock:
    image: suizer98/python-test-kit-mock:latest
    build: .
    volumes:
      - ./:/usr/src/app
    working_dir: /usr/src/app
    environment:
      - PYTHONUNBUFFERED=1
    command: 
      - bash
      - -c
      - |
        echo 'Mock environment ready!'
        tail -f /dev/null